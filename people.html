        <style>
            .flip-card {
              background-color: transparent;
              width: 250px;
              height: 250px;
              perspective: 1000px; /* Remove this if you don't want the 3D effect */
            }

            /* This container is needed to position the front and back side */
            .flip-card-inner {
              position: relative;
              width: 100%;
              height: 100%;
              text-align: center;
              transition: transform 0.8s;
              transform-style: preserve-3d;
            }

            /* Do an horizontal flip when you move the mouse over the flip box container */
            .flip-card:hover .flip-card-inner {
              transform: rotateY(180deg);
            }

            /* Position the front and back side */
            .flip-card-front, .flip-card-back {
              position: absolute;
              width: 100%;
              height: 100%;
              -webkit-backface-visibility: hidden; /* Safari */
              backface-visibility: hidden;
            }

            /* Style the front side (fallback if image is missing) */
            .flip-card-front {
              /*background-color: #f4f4f4;*/
              color: gray;
            }

            /* Style the back side */
            .flip-card-back {
              /*background-color: #f4f4f4;
              color: gray;*/
              transform: rotateY(180deg);
            }

            .alumni-container img {
            height: 50px;
            width: 50px;
            }

            /* --- Alumni-only sizing + responsive layout --- */
            .alumni-col {
                padding-left: 0.5rem;
                padding-right: 0.5rem;
            }

            /* smaller flip-card only for alumni */
            .flip-card.alumni-card {
                width: 120px;
                height: 120px;
                margin: 0 auto;
            }

            .flip-card.alumni-card img {
              width: 120px !important;
              height: 120px !important;
              object-fit: cover;
            }

            /* optional: make alumni text a bit tighter */
            .alumni-meta h5 {
                font-size: 0.95rem;
                margin-top: 0.5rem;
            }

            .alumni-meta small {
            font-size: 0.75rem;
            }

            /* smaller icons only for alumni cards (Font Awesome becomes SVG) */
            .alumni-meta .svg-inline--fa {
              width: 0.85em !important;
              height: 0.85em !important;
            }

            /* Academicons remain <i> */
            .alumni-meta i.ai {
              font-size: 1rem !important;
            }

            /* optional: tighter spacing */
            .alumni-meta a {
              margin-right: 3px !important;
            }

            .alumni-meta .svg-inline--fa,
            .alumni-meta i.ai {
              vertical-align: middle;
            }
  
        </style>

        <script type="text/javascript">
            function draw_card(profile, isAlumni=false){
            // Wrapper: keep members as-is, make alumni responsive grid (6 per row on lg)
            let wrapperStart = '';
            let wrapperEnd = '';

            if(isAlumni){
                // 2 per row on mobile, 3 on small, 4 on md, 6 on lg+
                wrapperStart = '<div class="col-6 col-sm-4 col-md-3 col-lg-2 alumni-col mb-4">';
                wrapperEnd = '</div>';
            }

            // Sizes: big for members, small for alumni
            const cardSize = isAlumni ? 120 : 250;
            const flipCardClass = isAlumni ? 'flip-card alumni-card' : 'flip-card';
            const metaClass = isAlumni ? 'text-center alumni-meta' : 'text-center';
            const faSizeClass = isAlumni ? '' : 'fa-2x';
            const aiSizeClass = isAlumni ? '' : 'ai-2x';

            let divStr = '';
            divStr += wrapperStart;

            // Keep your member "card" wrapper for members; alumni doesn't need the fixed-width card
            if(!isAlumni){
                divStr += '<div class="card mb-3" style="min-width: 250px; width: 250px; margin-left:1em; margin-bottom:3em; border-width:0;">';
            }

            divStr += '<div class="' + flipCardClass + '"><div class="flip-card-inner"><div class="flip-card-front">';
            divStr += '<img class="rounded-circle" src="data/people/' + profile['img'] + '" style="width:' + cardSize + 'px; height:' + cardSize + 'px;">';
            divStr += '</div>';
            divStr += '<div class="flip-card-back"><h3>' + profile['name'] + '</h3>';
            divStr += '<p class="card-text">' + profile['about'] + '</p>';
            divStr += '</div></div></div>';

            divStr += '<div class="' + metaClass + '"><h5 class="card-title text-center">' + profile['name'] + ' ' + profile['surname'] + '<br><small>' + profile['role'] + '</small></h5>';

            if('email' in profile['links']) {
                divStr += '<a href="mailto:' + profile['links']['email'] + '" target="_blank"><i class="fas fa-envelope ' + faSizeClass + '" style="color:#4d9de3;"></i></a>'
            }
            if('website' in profile['links']) {
                divStr += '<a href="' + profile['links']['website'] + '"><i class="fas fa-home ' + faSizeClass + '" style="color:#0ca1cf;"></i></a>'
            }
            if('scholar' in profile['links']) {
                divStr += '<a href="' + profile['links']['scholar'] + '"><i class="ai ai-google-scholar ' + aiSizeClass + '" style="color:#0e48cf;"></i></a>'
            }
            if('orcid' in profile['links']) {
                divStr += '<a href="' + profile['links']['orcid'] + '"><i class="ai ai-orcid ' + aiSizeClass + '"></i></a>'
            }
            if('twitter' in profile['links']) {
                divStr += '<a href="' + profile['links']['twitter'] + '"><i class="fab fa-twitter ' + faSizeClass + '" style="color:#1DA1F2;"></i></a>'
            }
            if('linkedin' in profile['links']) {
                divStr += '<a href="' + profile['links']['linkedin'] + '"><i class="fab fa-linkedin ' + faSizeClass + '" style="color:#0e76a8;"></i></a>'
            }
            divStr += '</div>';

            if(!isAlumni){
                divStr += '</div>'; // close member card wrapper
            }

            divStr += wrapperEnd;

            return divStr;
        }

            function prepare_user_cards(profiles){
                plist = _.filter(profiles, function(p){ return p['role'] == "Principle Investigator"; });
                $('#member-container').append(draw_card(plist[0]));

                plist = _.filter(profiles, function(p){ return p['role'] !== "Principle Investigator"; });
                plist = _.filter(plist, function(p){ return !p['hidden']; });
                plist = _.sortBy(plist, function(p){ return p['name']; });
                for (var i=0; i<plist.length; i++){
                    if(plist[i]['code'] == "Alumni"){
                        $('#alumni-container').append(draw_card(plist[i], true)); // small alumni
                    }
                    else{
                        $('#member-container').append(draw_card(plist[i], false)); // big members
                    }
                }
            }

            $(document).ready(function () {
                $('[data-toggle="tooltip"]').tooltip(); 
                $('#header-container').load('template_header.html');
                $('#footer-container').load('template_footer.html');

                $.getJSON('data/people/people.json',
                    function (json) {
                        prepare_user_cards(json);
                });
            });
        </script>
